name: Deploy to VPS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
        
    - name: Deploy to VPS
      run: |
        ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.VPS_HOST }} << 'ENDSSH'
          cd /mnt/miDisco/apps/work-hours-app
          git pull origin main
          cd /mnt/miDisco/apps/work-hours
          sudo docker-compose -f docker-compose.vps.yml down
          sudo docker-compose -f docker-compose.vps.yml build --no-cache
          sudo docker-compose -f docker-compose.vps.yml up -d
        ENDSSH
